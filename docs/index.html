<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <!-- SPA en hosting estático (GitHub Pages): el 404.html redirige acá con la
         ruta en el query (?/...) y este script la restaura antes de montar la app,
         para que recargar /admin, /panel, etc. no tire 404. -->
    <script>
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
