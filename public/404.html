<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>ClubPlaza</title>
    <!-- SPA fallback para GitHub Pages (técnica spa-github-pages). Reescribe la
         ruta a la forma /clubplaza-front/?/ruta y redirige al index, que la
         restaura. pathSegmentsToKeep = 1 por el base /clubplaza-front/. -->
    <script>
      (function () {
        var pathSegmentsToKeep = 1;
        var l = window.location;
        l.replace(
          l.protocol +
            '//' +
            l.hostname +
            (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
            '/?/' +
            l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash,
        );
      })();
    </script>
  </head>
  <body></body>
</html>
